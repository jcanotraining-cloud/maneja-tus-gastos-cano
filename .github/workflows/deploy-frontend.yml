name: 🚀 Deploy Frontend → Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-frontend.yml'

jobs:
  test-and-deploy:
    name: Test, Build & Deploy Angular
    runs-on: ubuntu-latest

    steps:
      # 1. Descargar el código
      - name: 📥 Checkout código
        uses: actions/checkout@v4

      # 2. Configurar Node.js
      - name: ⚙️ Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # 3. Instalar dependencias
      - name: 📦 Instalar dependencias
        working-directory: frontend
        run: npm ci

      # 4. Correr unit tests con ChromeHeadless
      - name: 🧪 Correr unit tests
        working-directory: frontend
        run: npm test -- --watch=false --browsers=ChromeHeadless

      # 5. Build de producción
      - name: 🏗️ Build producción (ng build)
        working-directory: frontend
        run: npm run build:prod

      # 6. Deploy a Firebase Hosting
      - name: 🔥 Deploy a Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          channelId: live
          projectId: ${{ secrets.FIREBASE_PROJECT_ID }}
          entryPoint: ./frontend
